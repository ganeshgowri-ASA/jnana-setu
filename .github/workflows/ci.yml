name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Vitest contract tests
        run: npm test

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: procurement-bridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Pull redis:7-alpine
        run: docker pull redis:7-alpine
      - name: Smoke-run bridge container
        run: |
          docker network create bridge-ci
          docker run -d --name redis-ci --network bridge-ci redis:7-alpine
          docker run -d --name bridge-ci --network bridge-ci \
            -e REDIS_URL=redis://redis-ci:6379 \
            -e PORT=3000 \
            -p 3000:3000 \
            procurement-bridge:ci
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/healthz; then
              echo "healthy"; exit 0
            fi
            sleep 1
          done
          echo "bridge did not become healthy"; docker logs bridge-ci; exit 1
      - name: Cleanup
        if: always()
        run: |
          docker rm -f bridge-ci redis-ci || true
          docker network rm bridge-ci || true
